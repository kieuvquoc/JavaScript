   <h1>Xử lý form trong javascript</h1>
    <!--  <h2>Đăng nhập</h2> -->
    <!-- action: 
    - dùng bên backend, de chuyen du liêu qua link trong action
    - neu k có link action thi se tự truyên du liêu lại chính nó
     -->
    <form id="form" action="https://www.24h.com.vn/">
      <div class="form-group">
        <label>Email:</label>
        <!-- the input de nhập du lieu vào -->
        <input type="text" id="email" placeholder="Nhập email..." value="" />
        <small id="emailError"></small>
      </div> 
      <div class="form-group">
        <label>Pass:</label>
        <input type="text" id="pass" placeholder="Nhập pass..." />
        <small id="passError"></small>
      </div>
      <!-- <textarea ></textarea> -->
      <!-- luôn có 1 the button de click vao -->
      <button type="submit">Gửi</button>
    </form>
  </div>
  <script>
    // - Cho form dừng sự kiện mặc định của action
    // - lấy  giá trị nhập vào thẻ input và kiểm tra:
    //   + nêu input chưa nhập thì báo lỗi
    //   + nếu đã nhập thi thông báo " thành công" và cho chạy action
    // mình tạo sẵn các biến trỏ tới các thẻ html cần dùng:

    // document: chi tới trang html 
    // getElementById: chi the html có id
    const form = document.getElementById("form");

    const emailInput = document.getElementById("email");
    const emailError = document.getElementById("emailError");

    const passInput = document.getElementById("pass");
    const passError = document.getElementById("passError");
    // khi người dùng click vao form
    // submit: chỉ dành cho form, sự kiện khi click vao button form 
    form.addEventListener("submit", function(e){
      e.preventDefault(); //cho form dừng action lại
     // lấy gia trị nhập vào input email
      email = emailInput.value;
      pass = passInput.value;
    // //neu email == rỗng
      if(email === ""){
          // alert("vui long nhap")
          // textContent: set doan text vao the html
          emailError.textContent = "vui long nhập email";
      }else{
        emailError.textContent = "";
      }
      if(pass === ""){
          // alert("vui long nhap")
          // textContent: set doan text vao the html
          passError.textContent = "vui long nhập email";
      }else{
          passError.textContent = "";
      }
      if(email !== "" && pass != ""){
        alert("thanh cong")
        form.submit();
      }
    })
