    function hamHide(){

  
      document.getElementById("box").style.display = "none"; // ẩn di
    }

    function hamShow(){
      document.getElementById("box").style.display = "block"; //hien thi ra
    }

    function hamAddClass(){
      document.getElementById("box").classList.add("active"); //them class active vao the html nay
    }

    function hamRemoveClass(){
      document.getElementById("box").classList.remove("active"); //xoa class active vao the html nay
    }

    function hamHasClass(){
      // classList.contains("active"): kiem tra class active co trong the html k?
      // - co thi tra ve true 
      // - k thi tra ve false
        
      let checkClass = document.getElementById("box").classList.contains("active");
      
      // alert(checkClass)
// 
      // neu co cvlass active trong the html co id=box
        if (checkClass==true) {
          // console.log("Có class active"); 
          // p hide
          // - xoa di
          hamShow(); //hien thi ra
          hamRemoveClass() //xoa active

        }else{
          // console.log("k co class active"); 
          // -them class vao active
          // p show

          hamHide() // ân the h1 di
          hamAddClass() //them class active vao
        }
    }
